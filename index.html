<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brainrots</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
}

h1{
  text-align:center;
  font-size:50px;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

input{
  width:100%;
  padding:12px;
  font-size:18px;
  border-radius:10px;
  border:none;
  margin-bottom:20px;
}

.item{
  border:2px solid white;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  cursor:pointer;
}

.item:hover{
  background:#111;
}

.section{
  margin-top:30px;
}

.section h2{
  text-align:center;
}

.small{
  font-size:14px;
  color:gray;
}
</style>
</head>

<body>

<div class="container">

<h1>Brainrots</h1>

<input id="search" placeholder="Search brainrots...">

<div id="list"></div>

<div class="section">
  <h2>Have</h2>
  <div id="have"></div>
</div>

</div>

<script>

/* =========================
   🔥 MASTER LIST (PASTE FULL LIST HERE)
   ========================= */

const RAW = `
Skibidi Toilet
Strawberry Elephant
Meowl
Headless Horseman
Nuclearo Dinossauro
Svinina Bombardino
Furiflura
Tim Cheese
Lirili Larila
Noobini Pizzanini
`;

/* =========================
   CLEAN LIST
   ========================= */

const BRAINROTS = Array.from(new Set(
  RAW.split("\n")
     .map(x => x.trim())
     .filter(x => x.length > 0)
));

/* =========================
   STATE
   ========================= */

let have = JSON.parse(localStorage.getItem("have") || "[]");

/* =========================
   ELEMENTS
   ========================= */

const list = document.getElementById("list");
const search = document.getElementById("search");
const haveDiv = document.getElementById("have");

/* =========================
   RENDER FUNCTIONS
   ========================= */

function renderList(filter=""){
  list.innerHTML = "";

  BRAINROTS
    .filter(x => x.toLowerCase().includes(filter.toLowerCase()))
    .slice(0, 200)
    .forEach(name => {

      const div = document.createElement("div");
      div.className = "item";
      div.textContent = name;

      div.onclick = () => {
        if(!have.includes(name)){
          have.push(name);
          save();
          renderHave();
        }
      };

      list.appendChild(div);
    });
}

function renderHave(){
  haveDiv.innerHTML = "";

  if(have.length === 0){
    haveDiv.innerHTML = `<div class="small">None...</div>`;
    return;
  }

  have.forEach(name => {
    const div = document.createElement("div");
    div.className = "item";
    div.textContent = name;

    div.onclick = () => {
      have = have.filter(x => x !== name);
      save();
      renderHave();
    };

    haveDiv.appendChild(div);
  });
}

/* =========================
   STORAGE
   ========================= */

function save(){
  localStorage.setItem("have", JSON.stringify(have));
}

/* =========================
   EVENTS
   ========================= */

search.addEventListener("input", () => {
  renderList(search.value);
});

/* =========================
   INIT
   ========================= */

renderList();
renderHave();

</script>

</body>
</html>
